{% extends "base.html" %}

{% block title %}{{ 'Редактирование' if note else 'Новая заметка' }} — Заметки{% endblock %}

{% block content %}
<div class="form-container">
    <h1>{{ 'Редактировать заметку' if note else 'Новая заметка' }}</h1>

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form
        method="post"
        action="{{ url_for('notes.update', note_id=note.id) if note else url_for('notes.create') }}"
    >
        <div class="form-group">
            <label for="title">Заголовок</label>
            <input
                type="text"
                id="title"
                name="title"
                value="{{ note.title if note else '' }}"
                required
                autofocus
                placeholder="Название заметки"
            >
        </div>

        <div class="form-group">
            <label for="content">Содержание</label>
            <textarea
                id="content"
                name="content"
                rows="12"
                placeholder="Текст заметки..."
            >{{ note.content if note else '' }}</textarea>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Сохранить</button>
            <a href="{{ url_for('notes.index') }}" class="btn">Отмена</a>
        </div>
    </form>
</div>
{% endblock %}
